<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Cord</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #313338;
    color: #dbdee1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #2b2d31;
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    border: 1px solid #1e1f22;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .logo svg {
    width: 36px;
    height: 36px;
    fill: #5865f2;
  }

  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    color: #f2f3f5;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #b5bac1;
    margin-bottom: 6px;
  }

  input, textarea {
    width: 100%;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 4px;
    color: #dbdee1;
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    transition: border-color 0.15s;
    outline: none;
  }

  input:focus, textarea:focus {
    border-color: #5865f2;
  }

  input::placeholder, textarea::placeholder {
    color: #4e5058;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  .webhook-field {
    margin-bottom: 1.25rem;
  }

  .webhook-note {
    font-size: 12px;
    color: #949ba4;
    margin-top: 6px;
  }

  .webhook-note a {
    color: #00a8fc;
    text-decoration: none;
  }

  .preview {
    background: #1e1f22;
    border-left: 4px solid #5865f2;
    border-radius: 0 4px 4px 0;
    padding: 10px 14px;
    font-size: 14px;
    color: #949ba4;
    margin-bottom: 1.25rem;
    min-height: 42px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preview .username {
    color: #5865f2;
    font-weight: 600;
  }

  .preview .msg {
    color: #dbdee1;
  }

  button {
    width: 100%;
    background: #5865f2;
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 11px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  button:hover { background: #4752c4; }
  button:active { transform: scale(0.99); }
  button:disabled { background: #4e5058; cursor: not-allowed; }

  .status {
    margin-top: 1rem;
    font-size: 13px;
    text-align: center;
    min-height: 18px;
  }

  .status.success { color: #23a55a; }
  .status.error { color: #f23f43; }

  .divider {
    border: none;
    border-top: 1px solid #1e1f22;
    margin: 1.5rem 0;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #4e5058;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36">
      <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
    <h1>Discord Messenger</h1>
  </div>

  <div class="section-title">Setup</div>

  <div class="webhook-field">
    <label for="webhook">Webhook URL</label>
    <input type="url" id="webhook" value="https://discord.com/api/webhooks/1515929847405346858/9MJzuUCeEPQX4wJAst_zd3QDeyyBYe27UG_cEb01vcn0kS4Yv9W85lkm1-yrkpfcIaHj" readonly style="opacity:0.5; cursor:not-allowed;" />
    <p class="webhook-note">Get this from your Discord server → Channel Settings → Integrations → Webhooks.</p>
  </div>

  <hr class="divider">

  <div class="section-title">Compose</div>

  <div class="field">
    <label for="message">Message</label>
    <textarea id="message" placeholder="What do you want to say?"></textarea>
  </div>

  <div>
    <label>Preview</label>
    <div class="preview" id="preview">
      <span style="color:#4e5058; font-style: italic;">Type a message to preview</span>
    </div>
  </div>

  <button id="sendBtn" onclick="sendMessage()">Send to Discord</button>
  <div class="status" id="status"></div>
</div>

<script>
  const messageInput = document.getElementById('message');
  const preview = document.getElementById('preview');

  const REPLACEMENT = "User didn't read rules!";

  const urlPattern = /https?:\/\/\S+|www\.\S+|\S+\.(com|net|org|io|gg|tv|co|me|xyz|app|dev|ru|info|biz|us|uk|ca|au)(\/\S*)?/gi;

  const profanityList = [
    'nigger','nigga','faggot','fag','chink','spic','kike','gook','wetback',
    'tranny','retard','cunt','coons','raghead','sandnigger','beaner','cracker',
    'dyke','troon','paki'
  ];
  const profanityPattern = new RegExp(`\\b(${profanityList.join('|')})\\b`, 'gi');

  const discordUsernamePattern = /<@!?\d+>|<@&\d+>|@(everyone|here)|[A-Za-z0-9_.]{2,32}#\d{4}/gi;

  function filterMessage(msg) {
    let filtered = msg;
    let triggered = false;

    if (urlPattern.test(filtered)) { triggered = true; }
    urlPattern.lastIndex = 0;
    if (profanityPattern.test(filtered)) { triggered = true; }
    profanityPattern.lastIndex = 0;
    if (discordUsernamePattern.test(filtered)) { triggered = true; }
    discordUsernamePattern.lastIndex = 0;

    return triggered ? REPLACEMENT : filtered;
  }

  function updatePreview() {
    const msg = messageInput.value.trim();

    if (!msg) {
      preview.innerHTML = '<span style="color:#4e5058; font-style:italic;">Type a message to preview</span>';
      return;
    }

    const filtered = filterMessage(msg);
    const flagged = filtered === REPLACEMENT;
    preview.innerHTML = `<span class="username">Anonymous</span><span class="msg" style="${flagged ? 'color:#f23f43;' : ''}">${escHtml(filtered)}</span>`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  messageInput.addEventListener('input', updatePreview);

  async function sendMessage() {
    const webhook = document.getElementById('webhook').value.trim();
    const raw = messageInput.value.trim();
    const msg = filterMessage(raw);
    const status = document.getElementById('status');
    const btn = document.getElementById('sendBtn');

    status.className = 'status';
    status.textContent = '';

    if (!webhook) { showStatus('Please enter a Discord webhook URL.', 'error'); return; }
    if (!webhook.startsWith('https://discord.com/api/webhooks/') && !webhook.startsWith('https://discordapp.com/api/webhooks/')) {
      showStatus('That doesn\'t look like a valid Discord webhook URL.', 'error'); return;
    }
    if (!raw) { showStatus('Please enter a message.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const res = await fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: msg, username: 'Anonymous' })
      });

      if (res.ok || res.status === 204) {
        showStatus('✓ Message sent!', 'success');
        messageInput.value = '';
        updatePreview();
      } else {
        const data = await res.json().catch(() => ({}));
        showStatus(`Error ${res.status}: ${data.message || 'Failed to send.'}`, 'error');
      }
    } catch (e) {
      showStatus('Network error — check your webhook URL and try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send to Discord';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }
</script>
</body>
</html>
